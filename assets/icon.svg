<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- Fond carré arrondi rose clair -->
  <rect width="64" height="64" rx="14" fill="#FCE4EC"/>

  <!-- Anneau supérieur (doigt) -->
  <circle cx="14" cy="18" r="9" fill="none" stroke="#C2185B" stroke-width="3.5"/>

  <!-- Anneau inférieur (doigt) -->
  <circle cx="14" cy="46" r="9" fill="none" stroke="#C2185B" stroke-width="3.5"/>

  <!-- Lame supérieure : anneau → pivot → pointe haute droite -->
  <path d="M 22 21 L 34 32 L 56 17"
        fill="none" stroke="#C2185B" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lame inférieure : anneau → pivot → pointe basse droite -->
  <path d="M 22 43 L 34 32 L 56 47"
        fill="none" stroke="#C2185B" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Vis centrale (pivot) -->
  <circle cx="34" cy="32" r="4.5" fill="#C2185B"/>
  <circle cx="34" cy="32" r="2"   fill="#FCE4EC"/>

  <!-- Accent bleu : petite touche sur les pointes -->
  <circle cx="56" cy="17" r="2.5" fill="#90CAF9"/>
  <circle cx="56" cy="47" r="2.5" fill="#90CAF9"/>

</svg>
